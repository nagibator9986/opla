#     listen 443 ssl http2;
#     server_name baqsy.kz www.baqsy.kz;
#     ssl_certificate     /etc/letsencrypt/live/baqsy.kz/fullchain.pem;
#     ssl_certificate_key /etc/letsencrypt/live/baqsy.kz/privkey.pem;
#     ssl_protocols TLSv1.2 TLSv1.3;
