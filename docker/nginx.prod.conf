# Baqsy System — production nginx.
#
# Behaviour:
#   - Port 80: responds to Let's Encrypt ACME challenges at /.well-known/,
#     everything else redirects to HTTPS — UNLESS no TLS certs are mounted,
#     in which case the HTTP-only server below serves the app as a fallback.
#   - Port 443: terminates TLS and proxies to django + SPA.
#
# The two include branches below are mutually exclusive: pick one by setting
# SERVER_NAME via envsubst in the deploy script, and swap the active server
# block. For simplicity this file ships the HTTP-only variant (works with any
# IP/domain), and the HTTPS block is commented — uncomment after running
# certbot and setting server_name.

upstream django {
    server web:8000;
}

upstream spa {
    server frontend:80;
}

# ---------- HTTP (80) ----------
server {
    listen 80 default_server;
    server_name _;
    client_max_body_size 20M;
    server_tokens off;

    # ACME challenge for Let's Encrypt (when HTTPS is enabled)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types
        text/plain text/css text/javascript application/javascript
        application/json application/xml image/svg+xml font/woff2;

    # Security headers (applied even on HTTP — they don't hurt)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Backend static + media, served from shared volumes
    location /static/ {
        alias /usr/share/nginx/html/static/;
        expires 30d;
        access_log off;
        add_header Cache-Control "public, immutable";
    }
    location /media/ {
        alias /usr/share/nginx/html/media/;
        expires 7d;
        access_log off;
    }

    # Django API / admin / webhooks
    location /api/ {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
    location /admin/ {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /health/ {
        proxy_pass http://django/health/;
        access_log off;
    }

    location = /_healthz {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    # Everything else — SPA (frontend container serves index.html + hashed assets)
    location / {
        proxy_pass http://spa;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ---------- HTTPS (443) — enable after certbot ----------
# Uncomment and set server_name once a certificate exists at
# /etc/letsencrypt/live/<domain>/. Then change the HTTP server above to
# `return 301 https://$host$request_uri;` for everything except /.well-known/.
#
