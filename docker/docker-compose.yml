services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-baqsy}
      POSTGRES_USER: ${POSTGRES_USER:-baqsy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-baqsy}
      LANG: ru_RU.UTF-8
      LC_ALL: ru_RU.UTF-8
      POSTGRES_INITDB_ARGS: "--locale=C.UTF-8 --encoding=UTF8"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-baqsy} -d ${POSTGRES_DB:-baqsy}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-baqsyminio}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-baqsyminio123}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  web:
    build:
      context: ../backend
      dockerfile: Dockerfile
    env_file: ../.env
    volumes:
      - ../backend:/app
      - ./entrypoint.sh:/docker/entrypoint.sh:ro
      - static_files:/app/staticfiles
      - media_files:/app/media
    entrypoint: ["/docker/entrypoint.sh"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    env_file: ../.env
    volumes:
      - ../backend:/app
    command: celery -A baqsy worker -Q default --pool=prefork --concurrency=2 --max-tasks-per-child=5 --loglevel=INFO
    depends_on:
      web:
        condition: service_healthy

  beat:
    build:
      context: ../backend
      dockerfile: Dockerfile
    env_file: ../.env
    volumes:
      - ../backend:/app
    command: celery -A baqsy beat --scheduler django_celery_beat.schedulers:DatabaseScheduler --loglevel=INFO
    depends_on:
      web:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    volumes:
      - ../frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    command: npm run dev -- --host 0.0.0.0
    environment:
      - VITE_API_URL=/api/v1
      - VITE_CLOUDPAYMENTS_PUBLIC_ID=${VITE_CLOUDPAYMENTS_PUBLIC_ID:-test_api_00000000000000000000001}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5173/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_files:/usr/share/nginx/html/static:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      web:
        condition: service_healthy
      frontend:
        condition: service_healthy

volumes:
  pg_data:
  redis_data:
  minio_data:
  static_files:
  media_files:
