{% load i18n %}

<div class="bdash-grid">
  <div class="bdash-panel bdash-stat">
    <p class="bdash-stat-label">{% trans "Всего заказов" %}</p>
    <p class="bdash-stat-value">{{ stats.total|default:0 }}</p>
  </div>

  <div class="bdash-panel bdash-stat">
    <p class="bdash-stat-label">{% trans "В работе" %}</p>
    <p class="bdash-stat-value bdash-accent-blue">{{ stats.in_progress|default:0 }}</p>
  </div>

  <div class="bdash-panel bdash-stat">
    <p class="bdash-stat-label">{% trans "Завершённых" %}</p>
    <p class="bdash-stat-value bdash-accent-green">{{ stats.delivered|default:0 }}</p>
  </div>

  <div class="bdash-panel bdash-stat">
    <p class="bdash-stat-label">{% trans "Выручка" %}</p>
    <p class="bdash-stat-value bdash-accent-amber">{{ stats.revenue|floatformat:0 }} &#8376;</p>
  </div>
</div>
